<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>NT_AGENCY | ZALO MULTI-SPREADER V3</title>
    <style>
        :root {
            --zalo-blue: #0068ff;
            --bg: #020202;
            --terminal-green: #00ff41;
        }

        body {
            background: var(--bg);
            color: var(--terminal-green);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-panel {
            width: 90%;
            max-width: 1100px;
            height: 85vh;
            border: 1px solid var(--zalo-blue);
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 104, 255, 0.2);
        }

        .top-nav {
            padding: 10px 20px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--zalo-blue);
        }

        .control-section {
            padding: 20px;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #222;
        }

        input {
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            flex: 1;
            font-size: 0.9rem;
        }

        button {
            background: var(--zalo-blue);
            color: white;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #0052cc; box-shadow: 0 0 15px var(--zalo-blue); }

        .content-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Danh sách Group quét được */
        .group-list {
            border-right: 1px solid #222;
            padding: 15px;
            overflow-y: auto;
        }

        /* Log rải link */
        .spread-log {
            padding: 15px;
            background: #050505;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
        }

        .group-card {
            background: #151515;
            padding: 8px;
            margin-bottom: 5px;
            border-left: 3px solid var(--zalo-blue);
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }

        .status-sending { color: yellow; animation: blink 1s infinite; }
        .status-done { color: var(--terminal-green); }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="top-nav">
        <div>ZALO_SPREAD_PROTOCOL_V3.0 // USER: NHAT_TIEN_MEDIA</div>
        <div>Uptime: 00:45:12 | Threads: 256 | Proxy: Residential_Rotating</div>
    </div>

    <div class="control-section">
        <input type="text" id="linkSpam" placeholder="Dán Link cần rải (Zalo Group/Web/Landing)...">
        <button onclick="startSpreading()">START CAMPAIGN</button>
    </div>

    <div class="content-area">
        <div class="group-list" id="groupList">
            <div style="color: #666;">> Chờ lệnh kích hoạt...</div>
        </div>
        <div class="spread-log" id="logArea">
            <div style="color: #666;">> System Ready. Waiting for target link...</div>
        </div>
    </div>
</div>

<script>
    function startSpreading() {
        const link = document.getElementById('linkSpam').value;
        if (!link) return alert("Chưa nhập link rải!");

        const groupList = document.getElementById('groupList');
        const logArea = document.getElementById('logArea');
        
        groupList.innerHTML = "<h3>TARGET GROUPS (FOUND: 450)</h3>";
        logArea.innerHTML = "<h3>REAL-TIME LOGS</h3>";

        const groups = [
            "Hội MMO Tự Do", "Cộng Đồng CapCut VN", "Tâm Sự Affiliate", 
            "GenZ Kiếm Tiền Online", "Hội Dropshipping", "Hội Support TikTok",
            "Chợ MMO Miền Tây", "Gia Đình 10A1 Support"
        ];

        let count = 0;
        const interval = setInterval(() => {
            if (count >= 50) {
                clearInterval(interval);
                const finish = document.createElement('div');
                finish.innerHTML = "<br><span style='color:cyan'>[!] CHIẾN DỊCH HOÀN TẤT. 450 LINK ĐÃ ĐƯỢC PHÁT TÁN.</span>";
                logArea.appendChild(finish);
                return;
            }

            // Tạo Group Card ngẫu nhiên
            const gName = groups[Math.floor(Math.random() * groups.length)] + " #" + (Math.floor(Math.random()*999));
            const card = documenat.createEleament('div');
            card.className = "group-card";
            card.innerHTML = `<span>${gName}</span> <span class="status-sending" id="st-${count}">SENDING...</span>`;
            groupList.prepend(card);

            // Tạo Log
            const log = document.createElement('div');
            log.style.marginBottom = "3px";
            log.innerHTML = `<span style="color:#666">[${new Date().toLocaleTimeString()}]</span> <span style="color:#00e5ff">[Thread-${Math.floor(Math.random()*256)}]</span> Đang rải link đến ${gName}...`;
            logArea.appendChild(log);
            logArea.scrollTop = logArea.scrollHeight;

            // Giả lập gửi xong sau 1s
            const currentCount = count;
            setTimeout(() => {
                const statusLabel = document.getElementById(`st-${currentCount}`);
                if(statusLabel) {
                    statusLabel.innerText = "SUCCESS";
                    statusLabel.className = "status-done";
                }
            }, 1200);

            count++;
        }, 400);
    }
</script>

</body>
</html>
